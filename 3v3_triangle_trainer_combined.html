<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#08140e">
<title>3v3 Triangle Trainer</title>
<style>
:root {
  --bg:#08140e;--panel:#13251a;--panel2:#1a3224;--text:#f5f8f5;--muted:#b7c8bd;
  --accent:#f6c85f;--blue:#3b82f6;--red:#ef4444;--line:rgba(255,255,255,.16);
  --shadow:0 18px 55px rgba(0,0,0,.36)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit}
#entry{position:fixed;inset:0;display:grid;place-items:center;padding:max(18px,env(safe-area-inset-top)) 16px max(18px,env(safe-area-inset-bottom));background:
radial-gradient(circle at 50% 16%,rgba(59,130,246,.18),transparent 32%),
linear-gradient(180deg,#07120c,#0b1c12);overflow:auto}
.entry-card{width:min(100%,480px);border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,var(--panel2),var(--panel));padding:20px;box-shadow:var(--shadow)}
.kicker{font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#ffe09b}
h1{margin:5px 0 7px;font-size:clamp(27px,8vw,38px);line-height:1.02;letter-spacing:-.035em}
.intro{margin:0 0 17px;color:var(--muted);font-size:13px;line-height:1.5}
.mode-grid{display:grid;gap:11px}
.mode-btn{position:relative;width:100%;min-height:138px;text-align:left;border:1px solid var(--line);border-radius:18px;padding:15px 50px 14px 15px;background:#193223;color:#fff;box-shadow:0 8px 22px rgba(0,0,0,.18);touch-action:manipulation}
.mode-btn:active{transform:scale(.992)}
.mode-btn.linked{background:linear-gradient(135deg,rgba(59,130,246,.30),#183122 60%)}
.mode-btn.free{background:linear-gradient(135deg,rgba(246,200,95,.22),#183122 60%)}
.mode-title{display:block;font-size:19px;font-weight:900}
.mode-desc{display:block;margin-top:6px;color:#d1ddd5;font-size:12px;line-height:1.42}
.mode-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:4px 7px;background:rgba(0,0,0,.12);font-size:9px;font-weight:850;letter-spacing:.05em;text-transform:uppercase}
.arrow{position:absolute;right:15px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.10);font-size:20px;font-weight:900}
.note{margin:14px 2px 0;color:#91a69a;font-size:10px;line-height:1.4;text-align:center}
#gameShell{position:fixed;inset:0;display:none;background:var(--bg)}
#gameFrame{display:block;width:100%;height:100%;border:0;background:var(--bg)}
#modeReturn{position:fixed;z-index:100;right:0;top:48%;display:none;border:1px solid rgba(255,255,255,.18);border-right:0;border-radius:12px 0 0 12px;padding:9px 5px;background:rgba(8,20,14,.72);color:rgba(255,255,255,.76);font-size:9px;font-weight:900;letter-spacing:.08em;writing-mode:vertical-rl;text-orientation:mixed;backdrop-filter:blur(6px);touch-action:manipulation}
#modeReturn:active{background:rgba(246,200,95,.85);color:#2b2105}
@media(max-height:700px){.entry-card{padding:15px}.mode-btn{min-height:112px;padding-top:11px;padding-bottom:10px}.mode-desc{font-size:11px}.mode-tags{margin-top:7px}}
@media(orientation:landscape) and (max-height:600px){#entry:before{content:"Rotate to portrait mode for the intended field view.";position:fixed;inset:0;z-index:5;display:grid;place-items:center;padding:30px;background:#08140e;text-align:center;font-size:20px}}
</style>
</head>
<body>
<section id="entry" aria-label="Choose a game mode">
  <div class="entry-card">
    <div class="kicker">Mobile 3v3 learning game</div>
    <h1>Triangle Trainer</h1>
    <p class="intro">Choose guided connected possessions or a live rules engine. Both modes use the same triangle-offense and pressure-cover-balance principles.</p>
    <div class="mode-grid">
      <button class="mode-btn linked" data-mode="linked">
        <span class="mode-title">Linked Lessons</span>
        <span class="mode-desc">Play connected restart sequences from kickoff, goal kick, corner, and kick-in. Attacks build to a shot; defensive sequences build to a protected steal.</span>
        <span class="mode-tags"><span class="tag">Guided</span><span class="tag">40 decisions</span><span class="tag">Coaching feedback</span></span>
        <span class="arrow">›</span>
      </button>
      <button class="mode-btn free" data-mode="free">
        <span class="mode-title">Free Play</span>
        <span class="mode-desc">Control any teammate and string actions together while the other five players react through the tactical rules engine.</span>
        <span class="mode-tags"><span class="tag">Dynamic AI</span><span class="tag">Switch players</span><span class="tag">Continuous flow</span></span>
        <span class="arrow">›</span>
      </button>
    </div>
    <p class="note">Designed for portrait mobile play and touchscreen controls.</p>
  </div>
</section>

<section id="gameShell" aria-label="3v3 game">
  <iframe id="gameFrame" title="3v3 Triangle Trainer game mode" allow="fullscreen"></iframe>
</section>
<button id="modeReturn" aria-label="Return to mode selection">MODES</button>

  const entry=document.getElementById('entry');
  const shell=document.getElementById('gameShell');
  const frame=document.getElementById('gameFrame');
  const modeReturn=document.getElementById('modeReturn');
  const utf8FromBase64=value=>new TextDecoder().decode(Uint8Array.from(atob(value),c=>c.charCodeAt(0)));

  function openMode(mode,push=true) {
    if(!encodedGames[mode]) return;
    frame.srcdoc=utf8FromBase64(encodedGames[mode]);
    entry.style.display='none';
    shell.style.display='block';
    modeReturn.style.display='block';
    document.title=mode==='linked'?'3v3 Linked Lessons':'3v3 Free Play';
    if(push) history.pushState({mode},'',`#${mode}`);
  }

  function showEntry(replace=false) {
    frame.srcdoc='';
    shell.style.display='none';
    modeReturn.style.display='none';
    entry.style.display='grid';
    document.title='3v3 Triangle Trainer';
    if(replace) history.replaceState({},'',location.pathname+location.search);
  }

  document.querySelectorAll('[data-mode]').forEach(button=>button.addEventListener('click',()=>openMode(button.dataset.mode)));
  modeReturn.addEventListener('click',()=>history.back());
  window.addEventListener('popstate',event=>{
    if(event.state?.mode) openMode(event.state.mode,false);
    else showEntry(false);
  });
  history.replaceState({},'',location.pathname+location.search);
})();
